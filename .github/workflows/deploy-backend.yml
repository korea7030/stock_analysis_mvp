name: Deploy Backend to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'Dockerfile'
      - '.github/workflows/deploy-backend.yml'

env:
  PROJECT_ID: gen-lang-client-0464272127
  REGION: us-central1
  ARTIFACT_REGISTRY: us-central1-docker.pkg.dev
  IMAGE_NAME: docker-repo/stock-analyzer-backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account_email: ${{ secrets.SERVICE_ACCOUNT_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Debug - Check authentication
        run: |
          echo "=== Current authenticated account ==="
          gcloud auth list
          echo ""
          echo "=== Service account info ==="
          gcloud auth application-default print-access-token | grep -o '"email":"[^"]*"' || echo "No token info"
          echo ""
          echo "=== Current project ==="
          gcloud config get-value project

      - name: Deploy to Cloud Run (using source)
        run: |
          gcloud run deploy stock-backend-api \
            --source=backend/ \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --project=${{ env.PROJECT_ID }}
      - name: Output service URL
        run: |
          echo "Deployment completed!"
          gcloud run services describe stock-backend-api \
            --region=${{ env.REGION }} \
            --platform=managed \
            --project=${{ env.PROJECT_ID }} \
            --format='value(status.url)'
