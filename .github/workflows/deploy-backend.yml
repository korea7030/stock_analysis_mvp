name: Deploy Backend to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

env:
  PROJECT_ID: gen-lang-client-0464272127
  REGION: us-central1
  ARTIFACT_REGISTRY: us-central1-docker.pkg.dev
  IMAGE_NAME: docker-repo/stock-analyzer-backend
  DEFAULT_ALLOWED_ORIGINS: https://finnblog.pe.kr,https://www.finnblog.pe.kr,https://stock-analysis-mvp.pages.dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT_EMAIL }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set GCP Project
        run: |
          gcloud config set project ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: |
          echo "=== Step 1: gcloud auth configure-docker ===" 
          gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet
          echo "✅ Step 1 completed"
          
          echo "=== Step 2: gcloud auth print-access-token ==="
          TOKEN=$(gcloud auth print-access-token)
          echo "Token length: ${#TOKEN}"
          echo "✅ Step 2 completed"
          
          echo "=== Step 3: docker login ==="
          echo $TOKEN | docker login -u oauth2accesstoken --password-stdin https://${{ env.ARTIFACT_REGISTRY }}
          echo "✅ Step 3 completed"
          
          echo "=== Step 4: verify docker config ==="
          cat ~/.docker/config.json | head -20
          echo "✅ Step 4 completed"

      - name: Build Docker image
        run: |
          docker build \
            -f backend/Dockerfile \
            -t ${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push image to Artifact Registry
        run: |
          docker push ${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Cloud Run
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS || env.DEFAULT_ALLOWED_ORIGINS }}
          RATE_LIMIT_ENABLED: ${{ vars.RATE_LIMIT_ENABLED || 'true' }}
          ANALYZE_IP_LIMIT: ${{ vars.ANALYZE_IP_LIMIT || '20' }}
          ANALYZE_IP_WINDOW_S: ${{ vars.ANALYZE_IP_WINDOW_S || '3600' }}
          ANALYZE_TICKER_LIMIT: ${{ vars.ANALYZE_TICKER_LIMIT || '8' }}
          ANALYZE_TICKER_WINDOW_S: ${{ vars.ANALYZE_TICKER_WINDOW_S || '900' }}
          SUMMARY_IP_LIMIT: ${{ vars.SUMMARY_IP_LIMIT || '10' }}
          SUMMARY_IP_WINDOW_S: ${{ vars.SUMMARY_IP_WINDOW_S || '86400' }}
          SUMMARY_TICKER_LIMIT: ${{ vars.SUMMARY_TICKER_LIMIT || '3' }}
          SUMMARY_TICKER_WINDOW_S: ${{ vars.SUMMARY_TICKER_WINDOW_S || '86400' }}
          CALENDAR_IP_LIMIT: ${{ vars.CALENDAR_IP_LIMIT || '120' }}
          CALENDAR_IP_WINDOW_S: ${{ vars.CALENDAR_IP_WINDOW_S || '600' }}
        run: |
          echo "Deploying with ALLOWED_ORIGINS=${ALLOWED_ORIGINS}"
          ENV_VARS="^|^ALLOWED_ORIGINS=${ALLOWED_ORIGINS}|RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED}|ANALYZE_IP_LIMIT=${ANALYZE_IP_LIMIT}|ANALYZE_IP_WINDOW_S=${ANALYZE_IP_WINDOW_S}|ANALYZE_TICKER_LIMIT=${ANALYZE_TICKER_LIMIT}|ANALYZE_TICKER_WINDOW_S=${ANALYZE_TICKER_WINDOW_S}|SUMMARY_IP_LIMIT=${SUMMARY_IP_LIMIT}|SUMMARY_IP_WINDOW_S=${SUMMARY_IP_WINDOW_S}|SUMMARY_TICKER_LIMIT=${SUMMARY_TICKER_LIMIT}|SUMMARY_TICKER_WINDOW_S=${SUMMARY_TICKER_WINDOW_S}|CALENDAR_IP_LIMIT=${CALENDAR_IP_LIMIT}|CALENDAR_IP_WINDOW_S=${CALENDAR_IP_WINDOW_S}"
          if [ -n "$DATABASE_URL" ]; then
            ENV_VARS="${ENV_VARS}|DATABASE_URL=${DATABASE_URL}"
          fi
          if [ -n "$OPENAI_API_KEY" ]; then
            ENV_VARS="${ENV_VARS}|OPENAI_API_KEY=${OPENAI_API_KEY}"
          fi

          gcloud run deploy stock-backend-api \
            --image=${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --set-env-vars="${ENV_VARS}" \
            --project=${{ env.PROJECT_ID }}

      - name: Output service URL
        run: |
          echo "Deployment completed!"
          gcloud run services describe stock-backend-api \
            --region=${{ env.REGION }} \
            --platform=managed \
            --project=${{ env.PROJECT_ID }} \
            --format='value(status.url)'
