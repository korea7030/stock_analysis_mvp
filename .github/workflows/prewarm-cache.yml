name: Prewarm Analysis Cache

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

env:
  PREWARM_TICKERS: ${{ vars.PREWARM_TICKERS || 'AAPL,MSFT,NVDA,GOOGL,AMZN,META,TSLA,AVGO,JPM,LLY,V,UNH,MA,XOM,COST' }}
  PREWARM_FORMS: ${{ vars.PREWARM_FORMS || '10-Q' }}
  PREWARM_SLEEP_S: ${{ vars.PREWARM_SLEEP_S || '1.5' }}
  SEC_RPS: ${{ vars.SEC_RPS || '5' }}
  SEC_MAX_FILINGS: ${{ vars.SEC_MAX_FILINGS || '5' }}

jobs:
  prewarm:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Check DATABASE_URL
        id: database-url
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL secret is not set; skipping cache prewarm because results cannot persist in response_cache."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Prewarm cache
        if: steps.database-url.outputs.configured == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PREWARM_TICKERS: ${{ env.PREWARM_TICKERS }}
          PREWARM_FORMS: ${{ env.PREWARM_FORMS }}
          PREWARM_SLEEP_S: ${{ env.PREWARM_SLEEP_S }}
          SEC_RPS: ${{ env.SEC_RPS }}
          SEC_MAX_FILINGS: ${{ env.SEC_MAX_FILINGS }}
        run: python backend/scripts/prewarm_cache.py
